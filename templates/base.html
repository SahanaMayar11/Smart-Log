<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Smart-Log{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">
      <span class="brand-mark">&#9635;</span>
      <span class="brand-text">SMART-LOG</span>
    </a>
    <span class="brand-sub">Automated Syslog Anomaly Detection</span>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">Isolation Forest + One-Class SVM &middot; SHAP explainability &middot; HDFS block-level detection</footer>
</body>
</html>
